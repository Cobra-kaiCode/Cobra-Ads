<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification System | Saurav Kumar</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 25px;
            border-radius: 20px;
            background: #1a1a1a;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            width: 85%;
            max-width: 400px;
        }
        h2 { color: #0088cc; margin-bottom: 10px; font-size: 24px; }
        p { font-size: 14px; color: #bbbbbb; margin-bottom: 25px; line-height: 1.5; }
        .btn {
            background: #0088cc;
            color: white;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, background 0.3s;
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: #444; cursor: not-allowed; }
        #timer-box { margin-top: 20px; font-size: 16px; color: #f1c40f; font-weight: bold; }
        .footer { margin-top: 30px; font-size: 13px; color: #777; line-height: 1.6; }
        .footer b { color: #0088cc; }
    </style>
</head>
<body>

    <div class="container">
        <h2>File Verification</h2>
        <p>To access your file, please visit our sponsor link for 10 seconds.</p>

        <button id="visitBtn" class="btn" onclick="startVerification()">1. Visit Link</button>

        <div id="timer-box" style="display:none;">
            Verifying in <span id="seconds">10</span>s...
        </div>

        <button id="unlockBtn" class="btn" style="display:none;" onclick="finishVerification()">2. Get File</button>

        <div class="footer">
            Developed by <b>Saurav Kumar</b><br>
            Official Project of <b>@BotWorld4U</b>
        </div>
    </div>

    <script>
        const webapp = window.Telegram.WebApp;
        webapp.expand(); 

        function startVerification() {
    webapp.openLink("https://omg10.com/4/10644290");

    // ⏳ Delay timer start (important)
    setTimeout(() => {
        document.getElementById('visitBtn').style.display = 'none';
        document.getElementById('timer-box').style.display = 'block';

        let timeLeft = 10;

        const timer = setInterval(() => {
            timeLeft--;
            document.getElementById('seconds').innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timer);
                document.getElementById('timer-box').style.display = 'none';
                document.getElementById('unlockBtn').style.display = 'block';
            }
        }, 1000);
    }, 1500); // 🔥 important delay
}

        function finishVerification() {
            // Send the signal back to the bot
            webapp.sendData("file_unlocked");
            webapp.close();
        }
    </script>
</body>
</html>
